<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airline Media Intelligence</title>
<style>
  body { font-family: Arial, sans-serif; background:#0b1020; color:#fff; padding:20px; }
  .status { margin-bottom:20px; }
</style>
</head>
<body>
<h1>Airline Media Intelligence</h1>
<div class="status" id="status">Loading...</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsYWbBosQOBY1lNcRxa5o6Q333pidIIJ2cRuHNioP9_szq2k7zshtlpVOERauJf9WOUwGwE5P3sm0A/pub?output=csv";

fetch(url)
  .then(r => r.text())
  .then(t => {
    const rows = t.split("\n").length - 1;
    document.getElementById("status").innerText = "Loaded " + rows + " rows successfully";
  })
  .catch(e => {
    document.getElementById("status").innerText = "Error loading data";
    console.error(e);
  });
</script>
</body>
</html>
